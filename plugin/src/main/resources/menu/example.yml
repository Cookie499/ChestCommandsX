######################
#+                  +#
#   MENU SETTINGS    #
#+                  +#
######################

menu-settings:

  # REQUIRED
  # Appears as the title of the menu.
  name: '&1Example menu'

  # REQUIRED
  # The number of rows in the menu.
  rows: 3

  # OPTIONAL
  # Set which commands a player can execute to open the menu.
  # Commands are registered automatically, so they will not appear red in the client command bar.
  # They are also safe to open on Paper/Folia 1.21.x.
  # Do not include the leading slash.
  commands:
  - 'menu'
  - 'examplemenu'

  # OPTIONAL
  # How frequently the menu will be refreshed, in seconds.
  # Useful if you have placeholders in icon descriptions.
  auto-refresh: 5

  # OPTIONAL
  # These actions will be executed when the menu is opened.
  # Supports all the icon action types.
  open-actions:
  - 'tell: &eYou opened the example menu.'
  - 'sound: ui.button.click'

  # OPTIONAL
  # The menu will open only when right-clicking with a compass.
  open-with-item:
    material: COMPASS
    left-click: false
    right-click: true


######################
#+                  +#
#       ICONS        #
#+                  +#
######################


spawn-command:
